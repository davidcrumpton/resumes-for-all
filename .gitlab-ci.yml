workflow:
  rules:
    # Run pipelines when templates, generator, data, or CI config change
    - changes:
        - templates/**/*
        - generate.py
        - resume.yaml
        - .gitlab-ci.yml
      when: always
    # Don't run for other changes (e.g., README, LICENSE)
    - when: never

stages:
  - build

build_resume:
  image: python:3.12
  stage: build
  script:
    - pip install pyyaml jinja2
    - apt-get update && apt-get install -y texlive-latex-base
      texlive-latex-extra texlive-fonts-recommended
    - python generate.py --build
  artifacts:
    paths:
      - "out/*.pdf"
      - "out/*.html"
      - "out/*.md"
      - "out/*.tex"
  tags:
    - docker
